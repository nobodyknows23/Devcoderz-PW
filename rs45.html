<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DevCoderz Ultra Player</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
.player{position:fixed;inset:0;background:#000}
video{width:100%;height:100%;object-fit:contain}

/* BIG CENTER PLAY */
.center-play{
 position:absolute;inset:0;
 display:flex;align-items:center;justify-content:center;
 z-index:30;cursor:pointer
}
.center-play.hide{display:none}
.center-play span{
 width:90px;height:90px;
 background:rgba(255,255,255,.25);
 backdrop-filter:blur(4px);
 border-radius:50%;
 display:flex;align-items:center;justify-content:center;
 font-size:40px;color:#fff
}

/* CONTROLS */
.controls{
 position:absolute;bottom:0;width:100%;
 padding:10px;
 background:linear-gradient(transparent,rgba(0,0,0,.95))
}
.progress{height:7px;background:#555;border-radius:10px;position:relative;margin-bottom:6px}
.progress-fill{height:100%;width:0;background:#2196f3;border-radius:10px}
.thumb{
 position:absolute;top:50%;
 width:18px;height:18px;
 background:#fff;border-radius:50%;
 transform:translate(-50%,-50%);left:0
}

.time{color:#fff;font-size:11px;text-align:right}
.row{display:flex;align-items:center;gap:6px;justify-content:space-between;color:#fff}

.btn{
 width:36px;height:36px;
 border:1.5px solid #fff;border-radius:50%;
 display:flex;align-items:center;justify-content:center;
 cursor:pointer
}

#play{font-size:0}
#play::before{content:"▶";font-size:16px;margin-left:2px}
#play.pause::before{content:"❚❚";margin-left:0}

/* SETTINGS */
.settings{
 position:absolute;bottom:60px;right:10px;
 background:#111;border-radius:12px;
 padding:12px;width:180px;
 display:none;z-index:50
}
.settings label{color:#aaa;font-size:11px}
.settings select{
 width:100%;margin:6px 0 12px;
 background:#000;color:#fff;
 border:1px solid #555;border-radius:4px;height:26px
}

/* TELEGRAM POPUP */
.overlay{
 position:fixed;inset:0;
 background:rgba(0,0,0,.7);
 display:flex;align-items:center;justify-content:center;
 z-index:100
}
.box{
 width:340px;padding:26px 24px;
 border-radius:22px;text-align:center;
 background:linear-gradient(135deg,#1e3c72,#2a5298);
 color:#fff
}
.box h2{line-height:1.4}
.box p{line-height:1.5;margin:8px 0 14px}
.box a,.box button{
 margin-top:14px;padding:14px;
 border-radius:28px;border:none;
 font-weight:700;width:100%
}
.join{background:#fff;color:#1e3c72;text-decoration:none}
.continue{background:rgba(0,0,0,.25);color:#fff;border:1px solid #fff}
</style>
</head>

<body>

<!-- TELEGRAM POPUP -->
<div class="overlay" id="tgPopup">
 <div class="box">
  <h2>Join our Telegram</h2>
  <p>Click below to join channel</p>
  <a class="join" href="https://t.me/+JXdxtVzQf-NhM2Jl" target="_blank">
   Join Telegram
  </a>
  <button class="continue" id="continueBtn">Continue to Video</button>
 </div>
</div>

<div class="player" id="player">
 <video id="video" playsinline></video>

 <!-- BIG CENTER PLAY -->
 <div class="center-play" id="centerPlay">
  <span>▶</span>
 </div>

 <div class="controls">
  <div class="progress" id="progress">
   <div class="progress-fill" id="bar"></div>
   <div class="thumb" id="thumb"></div>
  </div>
  <div class="time" id="time">00:00 / 00:00</div>

  <div class="row">
   <div class="btn" id="back">⟲10</div>
   <div class="btn" id="play"></div>
   <div class="btn" id="fwd">10⟳</div>
   <div class="btn" id="settingsBtn">⚙️</div>
   <div class="btn" id="fs">⛶</div>
  </div>
 </div>

 <!-- SETTINGS -->
 <div class="settings" id="settings">
  <label>Speed</label>
  <select id="speed">
   <option value="0.5">0.5x</option>
   <option value="0.75">0.75x</option>
   <option value="1" selected>1x</option>
   <option value="1.25">1.25x</option>
   <option value="1.5">1.5x</option>
   <option value="2">2x</option>
   <option value="2.5">2.5x</option>
   <option value="3">3x</option>
  </select>

  <label>Quality</label>
  <select id="quality">
   <option value="-1">AUTO</option>
  </select>
 </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const v=document.getElementById("video");
const playBtn=document.getElementById("play");
const back=document.getElementById("back");
const fwd=document.getElementById("fwd");
const fs=document.getElementById("fs");
const speed=document.getElementById("speed");
const quality=document.getElementById("quality");
const settings=document.getElementById("settings");
const settingsBtn=document.getElementById("settingsBtn");
const bar=document.getElementById("bar");
const thumb=document.getElementById("thumb");
const progress=document.getElementById("progress");
const timeEl=document.getElementById("time");
const centerPlay=document.getElementById("centerPlay");
const tgPopup=document.getElementById("tgPopup");
const continueBtn=document.getElementById("continueBtn");

let hls;
const url=new URLSearchParams(location.search).get("Url");

/* LOAD */
if(Hls.isSupported() && url){
 hls=new Hls();
 hls.loadSource(decodeURIComponent(url));
 hls.attachMedia(v);
 hls.on(Hls.Events.MANIFEST_PARSED,()=>{
  quality.innerHTML='<option value="-1">AUTO</option>';
  hls.levels.forEach((l,i)=>{
   if(l.height){
    const o=document.createElement("option");
    o.value=i;
    o.text=l.height+"p";
    quality.appendChild(o);
   }
  });
 });
}else if(url){
 v.src=decodeURIComponent(url);
}

/* CONTINUE */
continueBtn.onclick=()=>{
 tgPopup.style.display="none";
};

/* CENTER PLAY */
centerPlay.onclick=()=>v.play();

/* PLAY / PAUSE */
playBtn.onclick=()=>v.paused?v.play():v.pause();
v.onplay=()=>{
 playBtn.classList.add("pause");
 centerPlay.classList.add("hide");
};
v.onpause=()=>{
 playBtn.classList.remove("pause");
 centerPlay.classList.remove("hide");
};

/* BACK / FWD */
back.onclick=()=>v.currentTime=Math.max(0,v.currentTime-10);
fwd.onclick=()=>v.currentTime=Math.min(v.duration,v.currentTime+10);

/* SPEED */
speed.onchange=e=>v.playbackRate=parseFloat(e.target.value);

/* QUALITY */
quality.onchange=e=>{
 if(hls) hls.currentLevel=parseInt(e.target.value);
};

/* SETTINGS */
settingsBtn.onclick=e=>{
 e.stopPropagation();
 settings.style.display=settings.style.display==="block"?"none":"block";
};
settings.onclick=e=>e.stopPropagation();
document.body.onclick=()=>settings.style.display="none";

/* FULLSCREEN */
fs.onclick=()=>{
 !document.fullscreenElement
 ? document.documentElement.requestFullscreen()
 : document.exitFullscreen();
};

/* TIME */
v.ontimeupdate=()=>{
 if(!v.duration)return;
 let p=v.currentTime/v.duration*100;
 bar.style.width=thumb.style.left=p+"%";
 timeEl.textContent=
  Math.floor(v.currentTime)+" / "+Math.floor(v.duration);
};
</script>

</body>
</html>

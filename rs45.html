<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DevCoderz Ultra Smooth Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
.player{position:fixed;inset:0;background:#000;pointer-events:auto;}
video{width:100%;height:100%;object-fit:contain;}
.top-brand{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:40;text-align:center;pointer-events:none;}
.top-brand .jsr{color:#ff9800;font-weight:700;font-size:14px;}
.top-brand .dev{margin-top:4px;font-size:12px;font-weight:600;color:#00e5ff;text-shadow:0 0 6px #00e5ff, 0 0 12px #00e5ff;}
.center-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:30;cursor:pointer}
.center-play.hide{display:none}
.center-play span{width:90px;height:90px;background:rgba(255,255,255,.25);backdrop-filter:blur(5px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff}
.controls{position:absolute;bottom:0;width:100%;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.9));transition:.3s;z-index:35;}
.controls.hide{transform:translateY(100%);opacity:0;}
.progress{height:7px;background:#555;border-radius:10px;position:relative;margin-bottom:6px;touch-action:none;cursor:pointer;}
.progress-fill{height:100%;width:0;background:#2196f3;border-radius:10px;}
.thumb{position:absolute;top:50%;width:18px;height:18px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);left:0;}
.time{color:#fff;font-size:11px;text-align:right;margin-bottom:4px;}
.row{display:flex;align-items:center;gap:6px;justify-content:space-between;color:#fff;}
.btn{width:40px;height:40px;border:1px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;}
#play.pause::before{content:"❚❚";}
#play::before{content:"▶";}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;}
.box{width:320px;padding:20px;border-radius:20px;text-align:center;background:#1e3c72;color:#fff;}
.box a,.box button{display:block;margin-top:10px;padding:12px;border-radius:20px;border:none;font-weight:700;cursor:pointer;width:100%;text-decoration:none;color:#fff;background:rgba(0,0,0,0.3);}
</style>
</head>
<body>
<div class="overlay" id="tgPopup">
 <div class="box">
  <h3>Join Telegram</h3>
  <a href="https://t.me/+JXdxtVzQf-NhM2Jl" target="_blank">Join Channel</a>
  <button id="continueBtn">Continue to Video</button>
 </div>
</div>
<div class="player" id="player">
 <video id="video" playsinline></video>
 <div class="top-brand">
  <div class="jsr">🚩 Jai Shree Ram 🚩</div>
  <div class="dev">Developed by - Devansh Sharma</div>
 </div>
 <div class="center-play" id="centerPlay"><span>▶</span></div>
 <div class="controls hide" id="controls">
  <div class="progress" id="progress">
   <div class="progress-fill" id="bar"></div>
   <div class="thumb" id="thumb"></div>
  </div>
  <div class="time" id="time">00:00 / 00:00</div>
  <div class="row">
   <div class="btn" id="back">⟲</div>
   <div class="btn" id="play"></div>
   <div class="btn" id="fwd">⟳</div>
   <div class="btn" id="fs">⛶</div>
  </div>
 </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const v=document.getElementById("video"),bar=document.getElementById("bar"),thumb=document.getElementById("thumb"),progress=document.getElementById("progress"),timeDisplay=document.getElementById("time");
const playBtn=document.getElementById("play"),back=document.getElementById("back"),fwd=document.getElementById("fwd"),fs=document.getElementById("fs"),controls=document.getElementById("controls");
const urlParams=new URLSearchParams(location.search);
const url=urlParams.get("Url");

if(url){
 if(Hls.isSupported()){let h=new Hls();h.loadSource(decodeURIComponent(url));h.attachMedia(v);}
 else{v.src=decodeURIComponent(url);}
}

function fmt(s){let m=Math.floor(s/60),sec=Math.floor(s%60);return `${m}:${sec<10?'0':''}${sec}`;}
function updateUI(){
 let p=(v.currentTime/v.duration)*100;
 bar.style.width=thumb.style.left=p+"%";
 timeDisplay.textContent=fmt(v.currentTime)+" / "+fmt(v.duration||0);
}

v.ontimeupdate=updateUI;
document.getElementById("continueBtn").onclick=()=>{document.getElementById("tgPopup").style.display="none";};
playBtn.onclick=(e)=>{e.preventDefault();v.paused?v.play():v.pause();};
back.onclick=(e)=>{e.preventDefault();v.currentTime-=10;};
fwd.onclick=(e)=>{e.preventDefault();v.currentTime+=10;};
fs.onclick=(e)=>{e.preventDefault();if(!document.fullscreenElement){v.requestFullscreen();screen.orientation?.lock('landscape');}else{document.exitFullscreen();}};

// Drag logic
progress.onpointerdown=progress.onpointermove=(e)=>{
 if(e.buttons!==1)return;
 let rect=progress.getBoundingClientRect();
 let pos=(e.clientX-rect.left)/rect.width;
 v.currentTime=pos*v.duration;
};

v.onplay=()=>playBtn.classList.add("pause");
v.onpause=()=>playBtn.classList.remove("pause");
document.getElementById("player").onclick=(e)=>{if(e.target===v||e.target===document.getElementById("player"))controls.classList.toggle("hide");};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DevCoderz Ultra Player</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
.player{position:fixed;inset:0;background:#000}
video{width:100%;height:100%;object-fit:contain}

/* TOP BRAND */
.top-brand{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:20;text-align:center;pointer-events:none}
.top-brand .jsr{color:#ff9800;font-weight:700;font-size:14px}
.top-brand .dev{font-size:11px;color:#fff;opacity:.85}

/* CENTER PLAY */
.center-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:5;cursor:pointer}
.center-play.hide{display:none}
.center-play span{width:84px;height:84px;background:rgba(255,255,255,.25);backdrop-filter:blur(4px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;color:#fff}

/* CONTROLS */
.controls{position:absolute;bottom:0;width:100%;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.95));transition:.3s}
.controls.hide{transform:translateY(100%);opacity:0}

.progress{height:7px;background:#555;border-radius:10px;position:relative;margin-bottom:6px}
.progress-fill{height:100%;width:0;background:#2196f3;border-radius:10px}
.thumb{position:absolute;top:50%;width:18px;height:18px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);left:0}

.time{color:#fff;font-size:11px;text-align:right}
.row{display:flex;align-items:center;gap:6px;justify-content:space-between;color:#fff}

.btn{width:36px;height:36px;border:1.5px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}

#play{font-size:0}
#play::before{content:"▶";font-size:16px;margin-left:2px}
#play.pause::before{content:"❚❚";margin-left:0}

/* SETTINGS POPUP */
.settings{position:absolute;bottom:60px;right:10px;background:#111;border-radius:12px;padding:12px;width:160px;display:none;z-index:30}
.settings label{color:#aaa;font-size:11px}
.settings select{width:100%;margin-top:4px;margin-bottom:10px;background:#000;color:#fff;border:1px solid #555;border-radius:4px;height:26px}

/* TELEGRAM */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:50}
.box{width:360px;padding:32px;border-radius:22px;text-align:center;background:linear-gradient(135deg,#1e3c72,#2a5298);color:#fff}
.box a,.box button{margin-top:16px;padding:14px;border-radius:28px;border:none;font-weight:700;width:100%}
.join{background:#fff;color:#1e3c72;text-decoration:none}
.continue{background:rgba(0,0,0,.25);color:#fff;border:1px solid #fff}
</style>
</head>

<body>

<div class="overlay" id="tgPopup">
 <div class="box">
  <h2>Join our Telegram</h2>
  <a class="join" href="https://t.me/+JXdxtVzQf-NhM2Jl" target="_blank">Join Telegram</a>
  <button class="continue" id="continueBtn">Continue</button>
 </div>
</div>

<div class="player" id="player">
<video id="video" playsinline></video>

<div class="top-brand">
 <div class="jsr">🚩 Jai Shree Ram 🚩</div>
 <div class="dev">Developed by Devansh Sharma</div>
</div>

<div class="center-play hide" id="centerPlay"><span>▶</span></div>

<div class="controls hide" id="controls">
 <div class="progress" id="progress">
  <div class="progress-fill" id="bar"></div>
  <div class="thumb" id="thumb"></div>
 </div>
 <div class="time" id="time">00:00:00 / 00:00:00</div>

 <div class="row">
  <div class="btn" id="back">⟲10</div>
  <div class="btn" id="play"></div>
  <div class="btn" id="fwd">10⟳</div>
  <div class="btn" id="settingsBtn">⚙️</div>
  <div class="btn" id="fs">⛶</div>
 </div>
</div>

<div class="settings" id="settings">
 <label>Speed</label>
 <select id="speed">
  <option>0.5</option><option>0.75</option>
  <option selected>1</option>
  <option>1.25</option><option>1.5</option>
  <option>2</option><option>2.25</option><option>2.5</option><option>2.75</option><option>3</option>
 </select>

 <label>Quality</label>
 <select id="quality">
  <option value="-1">AUTO</option>
  <option value="1080">1080p</option>
 </select>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const v=video,controls=controls,centerPlay=centerPlay,
bar=bar,thumb=thumb,progress=progress,timeEl=time,
playBtn=play,back=back,fwd=fwd,
speed=speed,quality=quality,fs=fs,
settings=document.getElementById("settings"),
settingsBtn=document.getElementById("settingsBtn"),
tgPopup=tgPopup,continueBtn=continueBtn;

let hls,drag=false,pctVal=0;
const url=new URLSearchParams(location.search).get("Url");

const fmt=t=>isNaN(t)?"00:00:00":[t/3600|0,t%3600/60|0,t%60|0].map(n=>String(n).padStart(2,"0")).join(":");

if(Hls.isSupported()&&url){
 hls=new Hls();
 hls.loadSource(decodeURIComponent(url));
 hls.attachMedia(v);
}else if(url){v.src=decodeURIComponent(url);}

continueBtn.onclick=()=>{tgPopup.style.display="none";centerPlay.classList.remove("hide");};
centerPlay.onclick=()=>v.play();
playBtn.onclick=()=>v.paused?v.play():v.pause();
v.onplay=()=>{playBtn.classList.add("pause");centerPlay.classList.add("hide");};
v.onpause=()=>{playBtn.classList.remove("pause");centerPlay.classList.remove("hide");};

settingsBtn.onclick=e=>{
 e.stopPropagation();
 settings.style.display=settings.style.display==="block"?"none":"block";
};

speed.onchange=e=>v.playbackRate=parseFloat(e.target.value);
quality.onchange=e=>{
 if(hls && e.target.value!="-1") hls.currentLevel=0;
};

player.onclick=()=>settings.style.display="none";

fs.onclick=()=>!document.fullscreenElement?player.requestFullscreen():document.exitFullscreen();

v.ontimeupdate=()=>{
 if(!v.duration)return;
 let p=v.currentTime/v.duration*100;
 bar.style.width=thumb.style.left=p+"%";
 timeEl.textContent=`${fmt(v.currentTime)} / ${fmt(v.duration)}`;
};
</script>
</body>
</html>

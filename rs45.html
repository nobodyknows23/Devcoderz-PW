<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DevCoderz Ultra Smooth Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
.player{position:fixed;inset:0;background:#000;pointer-events:auto;}
video{width:100%;height:100%;object-fit:contain;}
.top-brand{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:40;text-align:center;pointer-events:none;}
.top-brand .jsr{color:#ff9800;font-weight:700;font-size:14px;}
.top-brand .dev{margin-top:4px;font-size:12px;font-weight:600;color:#00e5ff;text-shadow:0 0 6px #00e5ff, 0 0 12px #00e5ff;}
.center-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:30;cursor:pointer}
.center-play.hide{display:none}
.center-play span{width:90px;height:90px;background:rgba(255,255,255,.25);backdrop-filter:blur(5px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff}
.controls{position:absolute;bottom:0;width:100%;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.9));transition:.3s;z-index:35;}
.controls.hide{transform:translateY(100%);opacity:0;}
.progress{height:7px;background:#555;border-radius:10px;position:relative;margin-bottom:6px;touch-action:none;cursor:pointer;}
.progress-fill{height:100%;width:0;background:#2196f3;border-radius:10px;}
.thumb{position:absolute;top:50%;width:18px;height:18px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);left:0;}
.time{color:#fff;font-size:11px;text-align:right;margin-bottom:4px;}
.row{display:flex;align-items:center;gap:6px;justify-content:space-between;color:#fff;}
.btn{width:42px;height:42px;border:1.5px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;}
#play{font-size:0;}
#play::before{content:"▶";font-size:16px;margin-left:2px;}
#play.pause::before{content:"❚❚";margin-left:0;font-size:14px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;}
.box{width:320px;padding:26px;border-radius:22px;text-align:center;background:linear-gradient(135deg,#1e3c72,#2a5298);color:#fff;}
.tg-btn{display:block;margin-top:14px;padding:14px;border-radius:28px;font-weight:700;width:100%;cursor:pointer;text-align:center;user-select:none;}
.join{background:#fff;color:#1e3c72;text-decoration:none;}
.continue{background:rgba(0,0,0,.25);color:#fff;border:1px solid #fff;}
</style>
</head>
<body>
<div class="overlay" id="tgPopup">
 <div class="box">
  <h2>Join our Telegram</h2>
  <p>Click below to join channel</p>
  <a class="tg-btn join" href="https://t.me/+JXdxtVzQf-NhM2Jl" target="_blank">Join Telegram</a>
  <div class="tg-btn continue" id="continueBtn">Continue to Video</div>
 </div>
</div>
<div class="player" id="player">
 <video id="video" playsinline></video>
 <div class="top-brand">
  <div class="jsr">🚩 Jai Shree Ram 🚩</div>
  <div class="dev">Developed by - Devansh Sharma</div>
 </div>
 <div class="center-play" id="centerPlay"><span>▶</span></div>
 <div class="controls hide" id="controls">
  <div class="progress" id="progress">
   <div class="progress-fill" id="bar"></div>
   <div class="thumb" id="thumb"></div>
  </div>
  <div class="time" id="time">00:00:00 / 00:00:00</div>
  <div class="row">
   <div class="btn" id="back">⟲10</div>
   <div class="btn" id="play"></div>
   <div class="btn" id="fwd">10⟳</div>
   <div class="btn" id="fs">⛶</div>
  </div>
 </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const player=document.getElementById("player"),v=document.getElementById("video"),playBtn=document.getElementById("play"),back=document.getElementById("back"),fwd=document.getElementById("fwd"),fs=document.getElementById("fs"),controls=document.getElementById("controls"),centerPlay=document.getElementById("centerPlay"),progress=document.getElementById("progress"),bar=document.getElementById("bar"),thumb=document.getElementById("thumb"),tgPopup=document.getElementById("tgPopup"),continueBtn=document.getElementById("continueBtn"),timeDisplay=document.getElementById("time");
let drag=false,hideTimer;
const urlParams=new URLSearchParams(location.search);
const url=urlParams.get("Url");

function fmt(t){if(!t||t===Infinity||isNaN(t))return"00:00:00";let h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=Math.floor(t%60);return[h,m,s].map(n=>String(n).padStart(2,"0")).join(":");}
function pct(x){const r=progress.getBoundingClientRect();return Math.min(Math.max((x-r.left)/r.width,0),1);}

if(url){
 const decodedUrl=decodeURIComponent(url);
 if(Hls.isSupported()){let hls=new Hls();hls.loadSource(decodedUrl);hls.attachMedia(v);}
 else{v.src=decodedUrl;}
}

function safePlay(){v.play().catch(()=>{v.muted=true;v.play();});}
function show(f=false){controls.classList.remove("hide");clearTimeout(hideTimer);if(!f)hideTimer=setTimeout(()=>controls.classList.add("hide"),3000);}
function updateProgress(p){bar.style.width=thumb.style.left=p+"%";timeDisplay.textContent=`${fmt(v.currentTime)} / ${fmt(v.duration)}`;}

continueBtn.onclick=e=>{e.preventDefault();e.stopPropagation();tgPopup.style.display="none";controls.classList.remove("hide");centerPlay.classList.remove("hide");show();};
centerPlay.onclick=e=>{e.preventDefault();e.stopPropagation();safePlay();};
playBtn.onclick=e=>{e.preventDefault();e.stopPropagation();v.paused?safePlay():v.pause();};
back.onclick=e=>{e.preventDefault();e.stopPropagation();v.currentTime=Math.max(0,v.currentTime-10);show(true);};
fwd.onclick=e=>{e.preventDefault();e.stopPropagation();v.currentTime=Math.min(v.duration,v.currentTime+10);show(true);};

fs.onclick=e=>{
 e.preventDefault();e.stopPropagation();
 if(!document.fullscreenElement){
  player.requestFullscreen().then(()=>{if(screen.orientation)screen.orientation.lock('landscape').catch(()=>{});}).catch(()=>{});
 }else{
  document.exitFullscreen();if(screen.orientation)screen.orientation.unlock();
 }
};

progress.onpointerdown=e=>{e.preventDefault();e.stopPropagation();drag=true;progress.setPointerCapture(e.pointerId);v.pause();const s=pct(e.clientX);v.currentTime=s*v.duration;updateProgress(s*100);};
progress.onpointermove=e=>{if(drag&&v.duration){e.preventDefault();const s=pct(e.clientX);v.currentTime=s*v.duration;updateProgress(s*100);}};
progress.onpointerup=e=>{if(drag){drag=false;const s=pct(e.clientX);v.currentTime=s*v.duration;safePlay();}};

v.ontimeupdate=()=>{if(!drag&&v.duration){updateProgress((v.currentTime/v.duration)*100);}};
v.onplay=()=>{playBtn.classList.add("pause");centerPlay.classList.add("hide");show();};
v.onpause=()=>{playBtn.classList.remove("pause");centerPlay.classList.remove("hide");show(true);};

player.onclick=e=>{
 if(tgPopup.style.display!=="none")return;
 if(e.target===player||e.target===v){
  if(controls.classList.contains("hide"))show();else controls.classList.add("hide");
 }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DevCoderz Url Ultra Smooth Player </title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
.player{position:fixed;inset:0;background:#000;}
video{width:100%;height:100%;object-fit:contain;}

.top-brand{position:absolute;top:6px;left:50%;transform:translateX(-50%);
z-index:40;text-align:center;pointer-events:none;}
.top-brand .jsr{color:#ff9800;font-weight:700;font-size:14px;}
.top-brand .dev{font-size:11px;color:#fff;opacity:.85;}

.center-play{position:absolute;inset:0;display:flex;align-items:center;
justify-content:center;z-index:30;cursor:pointer}
.center-play.hide{display:none}
.center-play span{width:90px;height:90px;background:rgba(255,255,255,.25);
backdrop-filter:blur(5px);border-radius:50%;display:flex;
align-items:center;justify-content:center;font-size:40px;color:#fff}

.controls{position:absolute;bottom:0;width:100%;padding:10px;
background:linear-gradient(transparent,rgba(0,0,0,.9));
transition:.3s;z-index:35;}
.controls.hide{transform:translateY(100%);opacity:0;}

.progress{height:7px;background:#555;border-radius:10px;position:relative;margin-bottom:6px;}
.progress-fill{height:100%;width:0;background:#2196f3;border-radius:10px;}
.thumb{position:absolute;top:50%;width:18px;height:18px;background:#fff;
border-radius:50%;transform:translate(-50%,-50%);left:0;}

.time{color:#fff;font-size:11px;text-align:right;margin-bottom:4px;}
.row{display:flex;align-items:center;gap:6px;justify-content:space-between;color:#fff;}
.btn{width:38px;height:38px;border:1.5px solid #fff;border-radius:50%;
display:flex;align-items:center;justify-content:center;cursor:pointer;}

#play{font-size:0;}
#play::before{content:"▶";font-size:16px;margin-left:2px;}
#play.pause::before{content:"❚❚";margin-left:0;}

.settings{position:absolute;bottom:80px;right:10px;background:#111;border-radius:12px;
padding:12px;width:180px;display:none;z-index:50;}
.settings label{color:#aaa;font-size:11px;}
.settings select{width:100%;margin:6px 0 12px;background:#000;color:#fff;
border:1px solid #555;border-radius:4px;height:26px;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);
display:flex;align-items:center;justify-content:center;z-index:100;}
.box{width:340px;padding:26px;border-radius:22px;text-align:center;
background:linear-gradient(135deg,#1e3c72,#2a5298);color:#fff;}
.box a,.box button{margin-top:14px;padding:14px;border-radius:28px;border:none;
font-weight:700;width:100%;}
.join{background:#fff;color:#1e3c72;text-decoration:none;}
.continue{background:rgba(0,0,0,.25);color:#fff;border:1px solid #fff;}
</style>
</head>

<body>

<div class="overlay" id="tgPopup">
 <div class="box">
  <h2>Join our Telegram</h2>
  <p>Click below to join channel</p>
  <a class="join" href="https://t.me/+JXdxtVzQf-NhM2Jl" target="_blank">Join Telegram</a>
  <button class="continue" id="continueBtn">Continue to Video</button>
 </div>
</div>

<div class="player">
 <video id="video" playsinline></video>

 <div class="top-brand">
  <div class="jsr">🚩 Jai Shree Ram 🚩</div>
  <div class="dev">Developed by Devansh Sharma</div>
 </div>

 <div class="center-play" id="centerPlay"><span>▶</span></div>

 <div class="controls hide" id="controls">
  <div class="progress" id="progress">
   <div class="progress-fill" id="bar"></div>
   <div class="thumb" id="thumb"></div>
  </div>
  <div class="time" id="time">00:00:00 / 00:00:00</div>
  <div class="row">
   <div class="btn" id="back">⟲10</div>
   <div class="btn" id="play"></div>
   <div class="btn" id="fwd">10⟳</div>
   <div class="btn" id="settingsBtn">⚙️</div>
   <div class="btn" id="fs">⛶</div>
  </div>
 </div>

 <div class="settings" id="settings">
  <label>Speed</label>
  <select id="speed">
   <option value="0.5">0.5x</option>
   <option value="0.75">0.75x</option>
   <option value="1" selected>1x</option>
   <option value="1.25">1.25x</option>
   <option value="1.5">1.5x</option>
   <option value="2">2x</option>
   <option value="2.5">2.5x</option>
   <option value="3">3x</option>
  </select>
  <label>Quality</label>
  <select id="quality"><option value="-1">AUTO</option></select>
 </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const player=document.querySelector(".player");
const v=document.getElementById("video");
const playBtn=document.getElementById("play");
const back=document.getElementById("back");
const fwd=document.getElementById("fwd");
const fs=document.getElementById("fs");
const speed=document.getElementById("speed");
const quality=document.getElementById("quality");
const settings=document.getElementById("settings");
const settingsBtn=document.getElementById("settingsBtn");
const bar=document.getElementById("bar");
const thumb=document.getElementById("thumb");
const progress=document.getElementById("progress");
const timeEl=document.getElementById("time");
const centerPlay=document.getElementById("centerPlay");
const controls=document.getElementById("controls");
const tgPopup=document.getElementById("tgPopup");
const continueBtn=document.getElementById("continueBtn");

let hls,drag=false,seek=0,hideTimer;
const url=new URLSearchParams(location.search).get("Url");

function fmt(t){
 if(isNaN(t)) return "00:00:00";
 let h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=Math.floor(t%60);
 return [h,m,s].map(n=>String(n).padStart(2,"0")).join(":");
}

if(Hls.isSupported() && url){
 hls=new Hls();
 hls.loadSource(decodeURIComponent(url));
 hls.attachMedia(v);
 hls.on(Hls.Events.MANIFEST_PARSED,()=>{
  quality.innerHTML='<option value="-1">AUTO</option>';
  hls.levels.forEach((l,i)=>{
   if(l.height){
    let o=document.createElement("option");
    o.value=i;o.text=l.height+"p";
    quality.appendChild(o);
   }
  });
 });
}else if(url){v.src=decodeURIComponent(url);}

continueBtn.onclick=()=>tgPopup.style.display="none";

centerPlay.onclick=e=>{e.stopPropagation();v.play();}
playBtn.onclick=e=>{e.stopPropagation();v.paused?v.play():v.pause();}

v.onplay=()=>{playBtn.classList.add("pause");centerPlay.classList.add("hide");show();}
v.onpause=()=>{playBtn.classList.remove("pause");centerPlay.classList.remove("hide");show();}

back.onclick=e=>{e.stopPropagation();v.currentTime=Math.max(0,v.currentTime-10);show(true);}
fwd.onclick=e=>{e.stopPropagation();v.currentTime=Math.min(v.duration,v.currentTime+10);show(true);}

speed.onchange=e=>v.playbackRate=parseFloat(e.target.value);
quality.onchange=e=>hls&&(hls.currentLevel=parseInt(e.target.value));

settingsBtn.onclick=e=>{
 e.stopPropagation();
 settings.style.display=settings.style.display==="block"?"none":"block";
 show(true);
};

fs.onclick=e=>{
 e.stopPropagation();
 !document.fullscreenElement?player.requestFullscreen():document.exitFullscreen();
};

function pct(x){
 const r=progress.getBoundingClientRect();
 return Math.min(Math.max((x-r.left)/r.width,0),1);
}

/* ===== THUMB DRAG FIX (MOUSE + TOUCH) ===== */
progress.addEventListener("pointerdown",e=>{
 e.preventDefault();e.stopPropagation();
 drag=true;
 seek=pct(e.clientX);
 bar.style.width=thumb.style.left=seek*100+"%";
 show(true);
});

window.addEventListener("pointermove",e=>{
 if(!drag)return;
 seek=pct(e.clientX);
 bar.style.width=thumb.style.left=seek*100+"%";
});

window.addEventListener("pointerup",()=>{
 if(!drag)return;
 drag=false;
 v.currentTime=seek*v.duration;
 v.play();
});
/* ===== END FIX ===== */

v.ontimeupdate=()=>{
 if(drag||!v.duration)return;
 let p=v.currentTime/v.duration*100;
 bar.style.width=thumb.style.left=p+"%";
 timeEl.textContent=`${fmt(v.currentTime)} / ${fmt(v.duration)}`;
};

function show(force=false){
 controls.classList.remove("hide");
 clearTimeout(hideTimer);
 if(force)return;
 hideTimer=setTimeout(()=>controls.classList.add("hide"),2000);
}

player.onclick=e=>{
 if(e.target===player||e.target===v){
  controls.classList.contains("hide")?show():controls.classList.add("hide");
 }
};
</script>

</body>
</html>

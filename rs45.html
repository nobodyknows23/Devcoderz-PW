<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DevCoderz Smooth Video Player</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
.player{position:fixed;inset:0;background:#000;}
video{width:100%;height:100%;object-fit:contain;}

.center-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:-50;cursor:pointer}
.center-play.hide{display:none}
.center-play span{width:90px;height:90px;background:rgba(255,255,255,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff}

.controls{
 position:absolute;bottom:0;width:100%;
 padding:10px;
 background:linear-gradient(transparent,rgba(0,0,0,.9));
 z-index:35;transition:.3s
}
.controls.hide{transform:translateY(100%);opacity:0;}

.progress{height:7px;background:#555;border-radius:10px;position:relative;margin-bottom:6px;}
.progress-fill{height:100%;width:0;background:#2196f3;border-radius:10px;}
.thumb{
 position:absolute;top:50%;
 width:18px;height:18px;
 background:#fff;border-radius:50%;
 transform:translate(-50%,-50%);
 left:0;transition:left .08s linear;
}

.time{color:#fff;font-size:11px;text-align:right;margin-bottom:4px;}
.row{display:flex;gap:6px;justify-content:space-between;}
.btn{width:38px;height:38px;border:1.5px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;}

#play::before{content:"▶";font-size:16px;margin-left:2px;}
#play.pause::before{content:"❚❚";margin-left:0;}

.settings{
 position:absolute;bottom:60px;right:10px;
 background:#111;border-radius:10px;
 padding:10px;color:#fff;font-size:12px;
 display:none;z-index:50;
 max-height:220px;overflow:auto;
}
.settings div{margin:6px 0;cursor:pointer}
.settings div:hover{color:#2196f3}
</style>
</head>

<body>
<div class="player" id="player">
 <video id="video" playsinline></video>

 <div class="center-play" id="centerPlay"><span>▶</span></div>

 <div class="controls hide" id="controls">
  <div class="progress" id="progress">
   <div class="progress-fill" id="bar"></div>
   <div class="thumb" id="thumb"></div>
  </div>
  <div class="time" id="time">00:00:00 / 00:00:00</div>
  <div class="row">
   <div class="btn" id="back">⟲10</div>
   <div class="btn" id="play"></div>
   <div class="btn" id="fwd">10⟳</div>
   <div class="btn" id="fs">⛶</div>
   <div class="btn" id="settingsBtn">⚙</div>
  </div>
 </div>

 <div class="settings" id="settings"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const v=document.getElementById("video");
const player=document.getElementById("player");
const playBtn=document.getElementById("play");
const back=document.getElementById("back");
const fwd=document.getElementById("fwd");
const fs=document.getElementById("fs");
const centerPlay=document.getElementById("centerPlay");
const controls=document.getElementById("controls");
const progress=document.getElementById("progress");
const bar=document.getElementById("bar");
const thumb=document.getElementById("thumb");
const time=document.getElementById("time");
const settings=document.getElementById("settings");
const settingsBtn=document.getElementById("settingsBtn");

const params=new URLSearchParams(location.search);
const url=params.get("url")||params.get("Url");

let hls,dragging=false,hideTimer;

function fmt(t){
 if(isNaN(t))return"00:00:00";
 let h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=Math.floor(t%60);
 return[h,m,s].map(n=>String(n).padStart(2,"0")).join(":");
}

if(Hls.isSupported()&&url){
 hls=new Hls();
 hls.loadSource(decodeURIComponent(url));
 hls.attachMedia(v);
}else if(url){
 v.src=decodeURIComponent(url);
}

// ▶ controls logic
function showControls(){
 controls.classList.remove("hide");
 clearTimeout(hideTimer);
 hideTimer=setTimeout(()=>controls.classList.add("hide"),2000);
}

player.addEventListener("click",e=>{
 if(e.target.closest(".btn")||e.target.closest(".settings")) return;
 controls.classList.contains("hide")?showControls():controls.classList.add("hide");
 settings.style.display="none";
});

centerPlay.onclick=()=>{v.play();showControls();};
playBtn.onclick=()=>{v.paused?v.play():v.pause();showControls();};
back.onclick=()=>{v.currentTime=Math.max(0,v.currentTime-10);showControls();};
fwd.onclick=()=>{v.currentTime=Math.min(v.duration,v.currentTime+10);showControls();};
fs.onclick=()=>!document.fullscreenElement?document.documentElement.requestFullscreen():document.exitFullscreen();

v.onplay=()=>{playBtn.classList.add("pause");centerPlay.classList.add("hide");showControls();};
v.onpause=()=>{playBtn.classList.remove("pause");centerPlay.classList.remove("hide");showControls();};

v.ontimeupdate=()=>{
 if(dragging) return;
 let p=v.currentTime/v.duration*100;
 bar.style.width=thumb.style.left=p+"%";
 time.textContent=`${fmt(v.currentTime)} / ${fmt(v.duration)}`;
};

// smooth seek
function seek(e){
 const r=progress.getBoundingClientRect();
 const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
 const p=Math.min(Math.max(x/r.width,0),1);
 bar.style.width=thumb.style.left=(p*100)+"%";
 if(v.duration) v.currentTime=p*v.duration;
}

thumb.addEventListener("mousedown",()=>dragging=true);
document.addEventListener("mousemove",e=>dragging&&seek(e));
document.addEventListener("mouseup",()=>dragging=false);

thumb.addEventListener("touchstart",()=>dragging=true,{passive:true});
document.addEventListener("touchmove",e=>dragging&&seek(e),{passive:true});
document.addEventListener("touchend",()=>dragging=false);

progress.addEventListener("click",e=>{seek(e);showControls();});

// settings
settingsBtn.onclick=e=>{
 e.stopPropagation();
 settings.style.display=settings.style.display==="block"?"none":"block";
 renderSettings();
};

function renderSettings(){
 settings.innerHTML="<b>Speed</b>";
 [1,1.25,1.5,1.75,2,2.5,3].forEach(s=>{
  settings.innerHTML+=`<div onclick="video.playbackRate=${s}">${s}x</div>`;
 });
 if(hls){
  settings.innerHTML+="<br><b>Quality</b>";
  settings.innerHTML+=`<div onclick="hls.currentLevel=-1">Auto</div>`;
  hls.levels.forEach((l,i)=>{
   if(l.height) settings.innerHTML+=`<div onclick="hls.currentLevel=${i}">${l.height}p</div>`;
  });
 }
}
</script>
</body>
</html>

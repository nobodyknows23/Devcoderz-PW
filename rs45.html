<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DevCoderz Ultra Smooth Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
.player{position:fixed;inset:0;background:#000;pointer-events:auto;}
video{width:100%;height:100%;object-fit:contain;}
.top-brand{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:40;text-align:center;pointer-events:none;}
.top-brand .jsr{color:#ff9800;font-weight:700;font-size:14px;}
.top-brand .dev{margin-top:4px;font-size:12px;font-weight:600;color:#00e5ff;text-shadow:0 0 6px #00e5ff, 0 0 12px #00e5ff;}
.center-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:30;cursor:pointer}
.center-play.hide{display:none}
.center-play span{width:90px;height:90px;background:rgba(255,255,255,.25);backdrop-filter:blur(5px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff}
.controls{position:absolute;bottom:0;width:100%;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.9));transition:.3s;z-index:35;}
.controls.hide{transform:translateY(100%);opacity:0;}
.progress{height:7px;background:#555;border-radius:10px;position:relative;margin-bottom:6px;touch-action:none;cursor:pointer;}
.progress-fill{height:100%;width:0;background:#2196f3;border-radius:10px;}
.thumb{position:absolute;top:50%;width:18px;height:18px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);left:0;}
.time{color:#fff;font-size:11px;text-align:right;margin-bottom:4px;}
.row{display:flex;align-items:center;gap:6px;justify-content:space-between;color:#fff;}
.btn{width:40px;height:40px;border:1.5px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;}
#play{font-size:0;}
#play::before{content:"▶";font-size:16px;}
#play.pause::before{content:"❚❚";font-size:14px;}
.settings{position:absolute;bottom:70px;right:10px;background:#111;border-radius:12px;padding:12px;width:160px;display:none;z-index:50;}
.settings label{color:#aaa;font-size:10px;display:block;margin-bottom:4px;}
.settings select{width:100%;background:#000;color:#fff;border:1px solid #555;border-radius:4px;height:24px;margin-bottom:10px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;}
.box{width:320px;padding:26px;border-radius:22px;text-align:center;background:linear-gradient(135deg,#1e3c72,#2a5298);color:#fff;}
.tg-btn{display:block;margin-top:14px;padding:14px;border-radius:28px;font-weight:700;width:100%;cursor:pointer;text-align:center;text-decoration:none;color:#fff;}
.join{background:#fff;color:#1e3c72;}
.continue{background:rgba(0,0,0,.25);border:1px solid #fff;}
</style>
</head>
<body>
<div class="overlay" id="tgPopup">
 <div class="box">
  <h2>Join our Telegram</h2>
  <a class="tg-btn join" href="https://t.me/+JXdxtVzQf-NhM2Jl" target="_blank">Join Telegram</a>
  <div class="tg-btn continue" id="continueBtn">Continue to Video</div>
 </div>
</div>
<div class="player" id="player">
 <video id="video" playsinline></video>
 <div class="top-brand">
  <div class="jsr">🚩 Jai Shree Ram 🚩</div>
  <div class="dev">Developed by - Devansh Sharma</div>
 </div>
 <div class="center-play" id="centerPlay"><span>▶</span></div>
 <div class="controls hide" id="controls">
  <div class="progress" id="progress"><div class="progress-fill" id="bar"></div><div class="thumb" id="thumb"></div></div>
  <div class="time" id="time">00:00:00 / 00:00:00</div>
  <div class="row">
   <div class="btn" id="back">⟲10</div>
   <div class="btn" id="play"></div>
   <div class="btn" id="fwd">10⟳</div>
   <div class="btn" id="settingsBtn">⚙️</div>
   <div class="btn" id="fs">⛶</div>
  </div>
 </div>
 <div class="settings" id="settings">
  <label>Speed</label>
  <select id="speed">
   <option value="1" selected>1x</option>
   <option value="1.25">1.25x</option>
   <option value="1.5">1.5x</option>
   <option value="1.75">1.75x</option>
   <option value="2">2x</option>
   <option value="2.25">2.25x</option>
   <option value="2.5">2.5x</option>
   <option value="3">3x</option>
  </select>
  <label>Quality</label>
  <select id="quality"><option value="-1">AUTO</option></select>
 </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const player=document.getElementById("player"),v=document.getElementById("video"),playBtn=document.getElementById("play"),back=document.getElementById("back"),fwd=document.getElementById("fwd"),fs=document.getElementById("fs"),controls=document.getElementById("controls"),centerPlay=document.getElementById("centerPlay"),progress=document.getElementById("progress"),bar=document.getElementById("bar"),thumb=document.getElementById("thumb"),tgPopup=document.getElementById("tgPopup"),continueBtn=document.getElementById("continueBtn"),timeDisplay=document.getElementById("time"),settings=document.getElementById("settings"),settingsBtn=document.getElementById("settingsBtn"),speed=document.getElementById("speed"),quality=document.getElementById("quality");
let drag=false,hideTimer,hls;
const urlParams=new URLSearchParams(location.search);
const url=urlParams.get("Url");

if(url){
 const decodedUrl=decodeURIComponent(url);
 if(Hls.isSupported()){
  hls=new Hls();hls.loadSource(decodedUrl);hls.attachMedia(v);
  hls.on(Hls.Events.MANIFEST_PARSED,()=>{
   hls.levels.forEach((l,i)=>{let o=document.createElement("option");o.value=i;o.text=l.height+"p";quality.appendChild(o);});
  });
 }else{v.src=decodedUrl;}
}

function fmt(t){if(!t||isNaN(t))return"00:00:00";let h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=Math.floor(t%60);return[h,m,s].map(n=>String(n).padStart(2,"0")).join(":");}
function safePlay(){v.play().catch(()=>{v.muted=true;v.play();});}
function show(f=false){controls.classList.remove("hide");clearTimeout(hideTimer);if(!f)hideTimer=setTimeout(()=>controls.classList.add("hide"),3000);}

continueBtn.onclick=e=>{tgPopup.style.display="none";show();};
playBtn.onclick=e=>{e.preventDefault();v.paused?safePlay():v.pause();};
back.onclick=e=>{e.preventDefault();v.currentTime=Math.max(0,v.currentTime-10);};
fwd.onclick=e=>{e.preventDefault();v.currentTime=Math.min(v.duration,v.currentTime+10);};
settingsBtn.onclick=e=>{settings.style.display=(settings.style.display==="block"?"none":"block");};
speed.onchange=()=>v.playbackRate=speed.value;
quality.onchange=()=>{if(hls)hls.currentLevel=parseInt(quality.value);};
fs.onclick=e=>{if(!document.fullscreenElement){player.requestFullscreen();screen.orientation?.lock('landscape');}else{document.exitFullscreen();}};

progress.onpointerdown=e=>{drag=true;progress.setPointerCapture(e.pointerId);const s=(e.clientX-progress.getBoundingClientRect().left)/progress.offsetWidth;v.currentTime=s*v.duration;};
progress.onpointermove=e=>{if(drag){const s=Math.max(0,Math.min(1,(e.clientX-progress.getBoundingClientRect().left)/progress.offsetWidth));v.currentTime=s*v.duration;}};
progress.onpointerup=()=>drag=false;

v.ontimeupdate=()=>{bar.style.width=thumb.style.left=((v.currentTime/v.duration)*100)+"%";timeDisplay.textContent=`${fmt(v.currentTime)} / ${fmt(v.duration)}`;};
v.onplay=()=>playBtn.classList.add("pause");
v.onpause=()=>playBtn.classList.remove("pause");
player.onclick=e=>{if(e.target===v||e.target===player){controls.classList.toggle("hide");settings.style.display="none";}};
</script>
</body>
</html>

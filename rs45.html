<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ultra Smooth Player</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
html,body{width:100%;height:100%;background:#000;overflow:hidden}

.player{position:fixed;inset:0;background:#000}
video{width:100%;height:100%;object-fit:contain}

/* 🔥 TOP GLOW BRAND */
.top-brand{
 position:absolute;top:6px;left:50%;transform:translateX(-50%);
 text-align:center;z-index:40;pointer-events:none
}
.top-brand .jsr{
 color:#ff9800;font-weight:700;font-size:14px;
 text-shadow:0 0 10px #ff9800,0 0 20px #ff9800
}
.top-brand .dev{
 font-size:12px;color:#00e5ff;font-weight:600;
 text-shadow:0 0 8px #00e5ff,0 0 16px #00e5ff
}

/* CENTER PLAY */
.center-play{
 position:absolute;inset:0;display:flex;
 align-items:center;justify-content:center;
 z-index:30
}
.center-play.hide{display:none}
.center-play span{
 width:90px;height:90px;border-radius:50%;
 background:rgba(255,255,255,.25);
 display:flex;align-items:center;justify-content:center;
 font-size:40px;color:#fff
}

/* CONTROLS */
.controls{
 position:absolute;bottom:0;width:100%;
 padding:10px;
 background:linear-gradient(transparent,rgba(0,0,0,.9));
 transition:.3s;z-index:35
}
.controls.hide{transform:translateY(100%);opacity:0}

.progress{
 height:7px;background:#555;border-radius:10px;
 position:relative;margin-bottom:6px
}
.progress-fill{
 height:100%;width:0;background:#2196f3;border-radius:10px
}
.thumb{
 position:absolute;top:50%;
 width:18px;height:18px;border-radius:50%;
 background:#fff;transform:translate(-50%,-50%);
 left:0
}

.time{color:#fff;font-size:11px;text-align:right;margin-bottom:4px}
.row{display:flex;gap:6px;justify-content:space-between}

.btn{
 width:38px;height:38px;border:1.5px solid #fff;
 border-radius:50%;display:flex;
 align-items:center;justify-content:center;
 color:#fff;cursor:pointer
}

#play::before{content:"▶";font-size:16px;margin-left:2px}
#play.pause::before{content:"❚❚";margin-left:0}

/* SETTINGS */
.settings{
 position:absolute;bottom:60px;right:10px;
 background:#111;border-radius:10px;
 padding:8px;display:none;z-index:50
}
.settings button{
 width:100%;margin:4px 0;
 background:#222;color:#fff;
 border:none;padding:6px;border-radius:6px
}
</style>
</head>

<body>
<div class="player" id="player">
<video id="video" playsinline></video>

<div class="top-brand">
 <div class="jsr">🚩 Jai Shree Ram 🚩</div>
 <div class="dev">DevxShivam</div>
</div>

<div class="center-play" id="centerPlay"><span>▶</span></div>

<div class="controls hide" id="controls">
 <div class="progress" id="progress">
  <div class="progress-fill" id="bar"></div>
  <div class="thumb" id="thumb"></div>
 </div>
 <div class="time" id="time">00:00:00 / 00:00:00</div>
 <div class="row">
  <div class="btn" id="back">⟲10</div>
  <div class="btn" id="play"></div>
  <div class="btn" id="fwd">10⟳</div>
  <div class="btn" id="fs">⛶</div>
  <div class="btn" id="gear">⚙</div>
 </div>
</div>

<div class="settings" id="settings"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const v=video,controls=controls,bar=bar,thumb=thumb;
let hideTimer,drag=false;

const url=new URLSearchParams(location.search).get("url");
let hls;

if(Hls.isSupported() && url){
 hls=new Hls();
 hls.loadSource(url);
 hls.attachMedia(v);
}else if(url){v.src=url}

function fmt(t){
 if(isNaN(t))return"00:00:00";
 let h=Math.floor(t/3600),m=Math.floor(t%3600/60),s=Math.floor(t%60);
 return[h,m,s].map(n=>String(n).padStart(2,"0")).join(":");
}

/* TAP TO TOGGLE */
player.onclick=()=>{
 controls.classList.toggle("hide");
}

/* PLAY */
centerPlay.onclick=()=>v.play();
play.onclick=()=>v.paused?v.play():v.pause();
back.onclick=()=>v.currentTime=Math.max(0,v.currentTime-10);
fwd.onclick=()=>v.currentTime=Math.min(v.duration,v.currentTime+10);
fs.onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();

v.onplay=()=>{
 play.classList.add("pause");
 centerPlay.classList.add("hide");
 controls.classList.remove("hide");
};
v.onpause=()=>{
 play.classList.remove("pause");
 centerPlay.classList.remove("hide");
};

/* PROGRESS */
v.ontimeupdate=()=>{
 if(drag)return;
 let p=v.currentTime/v.duration*100;
 bar.style.width=thumb.style.left=p+"%";
 time.textContent=`${fmt(v.currentTime)} / ${fmt(v.duration)}`;
};

/* THUMB DRAG SMOOTH */
progress.onpointerdown=e=>{
 drag=true;
 controls.classList.remove("hide");
 move(e);
 document.onpointermove=move;
 document.onpointerup=()=>{
  drag=false;
  document.onpointermove=null;
  setTimeout(()=>controls.classList.add("hide"),2000);
 };
};

function move(e){
 let r=progress.getBoundingClientRect();
 let p=Math.min(100,Math.max(0,(e.clientX-r.left)/r.width*100));
 bar.style.width=thumb.style.left=p+"%";
 v.currentTime=p/100*v.duration;
}

/* SETTINGS */
gear.onclick=()=>{
 settings.style.display=settings.style.display?"":"block";
 settings.innerHTML="<b style='color:white'>Speed</b>";
 [1,1.25,1.5,1.75,2,2.5,3].forEach(s=>{
  let b=document.createElement("button");
  b.textContent=s+"x";
  b.onclick=()=>v.playbackRate=s;
  settings.appendChild(b);
 });
 if(hls){
  settings.innerHTML+="<b style='color:white'>Quality</b>";
  hls.levels.forEach((l,i)=>{
   let b=document.createElement("button");
   b.textContent=l.height+"p";
   b.onclick=()=>hls.currentLevel=i;
   settings.appendChild(b);
  });
 }
};
</script>
</body>
</html>

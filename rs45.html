<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DevCoderz Ultra Smooth Player</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color: transparent; }
    html, body { width:100%; height:100%; background:#000; overflow:hidden; }
    .player { position:fixed; inset:0; background:#000; }
    video { width:100%; height:100%; object-fit:contain; }
    .overlay { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; }
    .box { width:300px; padding:20px; background:#1e3c72; color:#fff; border-radius:15px; text-align:center; }
    .action-btn { display:block; padding:12px; margin:10px 0; background:#fff; color:#1e3c72; border-radius:20px; font-weight:bold; cursor:pointer; }
    .controls { position:absolute; bottom:0; width:100%; padding:15px; background:linear-gradient(transparent,rgba(0,0,0,0.8)); transition:0.3s; z-index:50; }
    .controls.hide { opacity:0; pointer-events:none; }
    .progress-bar { width:100%; height:10px; background:#444; cursor:pointer; position:relative; touch-action:none; }
    .fill { height:100%; width:0; background:#2196f3; }
    .thumb { position:absolute; top:-4px; width:18px; height:18px; background:#fff; border-radius:50%; left:0; pointer-events:none; }
    .row { display:flex; justify-content:space-between; margin-top:10px; color:#fff; }
    .btn { padding:10px; cursor:pointer; border:1px solid #fff; border-radius:20px; font-size:12px; }
    .settings { position:absolute; bottom:60px; right:10px; background:#222; padding:15px; border-radius:10px; color:#fff; display:none; }
</style>
</head>
<body>

<div class="overlay" id="tgPopup">
    <div class="box">
        <h3>Join Telegram</h3>
        <a class="action-btn" href="https://t.me/+JXdxtVzQf-NhM2Jl" target="_blank">Join Channel</a>
        <div class="action-btn" id="continueBtn">Continue to Video</div>
    </div>
</div>

<div class="player" id="player">
    <video id="video" playsinline></video>
    <div class="controls" id="controls">
        <div class="progress-bar" id="progress">
            <div class="fill" id="bar"></div>
            <div class="thumb" id="thumb"></div>
        </div>
        <div id="time" style="color:#fff; font-size:12px; margin:5px 0;">00:00 / 00:00</div>
        <div class="row">
            <div class="btn" id="playBtn">Play/Pause</div>
            <div class="btn" id="fsBtn">Full</div>
            <div class="btn" id="setBtn">Settings</div>
        </div>
    </div>
    <div class="settings" id="settingsMenu">
        Speed: <select id="speedSel"><option value="1">1x</option><option value="2">2x</option></select>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const v = document.getElementById("video"), bar = document.getElementById("bar"), thumb = document.getElementById("thumb"), prog = document.getElementById("progress");
    const playBtn = document.getElementById("playBtn"), controls = document.getElementById("controls");
    const url = new URLSearchParams(location.search).get("Url");

    // Init Video
    if(url){
        let hls = new Hls();
        hls.loadSource(decodeURIComponent(url));
        hls.attachMedia(v);
    }

    // Toggle Overlay & Controls
    document.getElementById("continueBtn").onclick = () => {
        document.getElementById("tgPopup").style.display = "none";
        v.play();
    };
    
    document.getElementById("player").onclick = () => controls.classList.toggle("hide");

    // Play/Pause
    playBtn.onclick = (e) => { e.stopPropagation(); v.paused ? v.play() : v.pause(); };

    // Seek Dragging
    const update = (e) => {
        let rect = prog.getBoundingClientRect();
        let pos = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        v.currentTime = pos * v.duration;
    };
    prog.onpointerdown = (e) => { update(e); prog.onpointermove = update; };
    prog.onpointerup = () => { prog.onpointermove = null; };

    // Sync Time
    v.ontimeupdate = () => {
        let p = (v.currentTime / v.duration) * 100;
        bar.style.width = thumb.style.left = p + "%";
        document.getElementById("time").innerText = Math.floor(v.currentTime/60)+":"+Math.floor(v.currentTime%60) + " / " + Math.floor(v.duration/60)+":"+Math.floor(v.duration%60);
    };

    // Fullscreen
    document.getElementById("fsBtn").onclick = (e) => { e.stopPropagation(); document.body.requestFullscreen(); };
    
    // Settings
    document.getElementById("setBtn").onclick = (e) => { 
        e.stopPropagation(); 
        document.getElementById("settingsMenu").style.display = "block"; 
    };
    document.getElementById("speedSel").onchange = (e) => v.playbackRate = e.target.value;
</script>
</body>
</html>

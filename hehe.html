<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .notes-card { background: white; padding: 1rem; margin-bottom: 0.75rem; border-radius: 0.75rem; border: 1px solid #f3f4f6; display: flex; align-items: center; gap: 1rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .notes-view-btn { background: #4f46e5; color: white; padding: 0.4rem 0.8rem; border-radius: 0.5rem; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="bg-gray-50 pb-16">
    <nav class="h-16 bg-white border-b flex items-center px-4 sticky top-0 z-20">
        <button onclick="history.back()" class="text-gray-600 font-bold text-sm">← Back</button>
        <h1 class="ml-4 font-bold text-gray-800">Content</h1>
    </nav>
    <div id="tabsContainer" class="flex gap-2 p-4 overflow-x-auto bg-white border-b sticky top-16 z-10">
        <button onclick="loadContent('videos', this)" class="tab-btn px-4 py-2 rounded-full bg-indigo-600 text-white text-sm font-bold">Lectures</button>
        <button onclick="loadContent('notes', this)" class="tab-btn px-4 py-2 rounded-full bg-white border text-sm font-bold">Notes</button>
        <button onclick="loadContent('DppNotes', this)" class="tab-btn px-4 py-2 rounded-full bg-white border text-sm font-bold">DPP</button>
    </div>
    <div id="contentContainer" class="p-4"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get("batchId");
        const sId = params.get("subjectId");
        const chapterSlug = params.get("chapterSlug");

        async function loadContent(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-indigo-600', 'text-white');
                b.classList.add('bg-white', 'border');
            });
            if(btn) { btn.classList.add('bg-indigo-600', 'text-white'); btn.classList.remove('bg-white', 'border'); }

            const container = document.getElementById('contentContainer');
            container.innerHTML = '<div class="text-center mt-10">Loading...</div>';

            try {
                const url = `https://DevCoderZ-player.vercel.app/api/lectures.js?batchId=${bId}&subjectId=${sId}&tag=${chapterSlug}&contentType=${tab}`;
                const res = await fetch(url);
                const json = await res.json();

                let htmlContent = '';
                if (json.data && json.data.length > 0) {
                    json.data.forEach(item => {
                        htmlContent += `
                            <div class="notes-card">
                                <div class="flex-1">
                                    <h3 class="font-bold text-sm text-gray-800">${item.topic}</h3>
                                    <p class="text-xs text-gray-500 mt-1">${item.videoDetails?.duration || ''}</p>
                                </div>
                                <button class="notes-view-btn" onclick="window.location.href='player.html?lectureId=${item._id}&batchId=${bId}'">View</button>
                            </div>`;
                    });
                } else {
                    htmlContent = '<div class="text-center mt-10 text-gray-500">No content found</div>';
                }
                container.innerHTML = htmlContent;
            } catch (e) {
                container.innerHTML = `<div class="text-center mt-10 text-red-500">Error: ${e.message}</div>`;
            }
        }
        loadContent('videos', document.querySelector('.tab-btn'));
    </script>
</body>
</html>

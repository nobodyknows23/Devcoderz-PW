<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
    #video { width: 100%; height: 90vh; }
    #status { padding: 10px; color: #0f0; }
  </style>
</head>
<body>

<div id="status">Initializing...</div>
<video id="video" controls autoplay></video>

<script>
  const status = document.getElementById('status');
  const video = document.getElementById('video');

  async function initPlayer() {
    const params = new URLSearchParams(window.location.search);
    const apiUrl = `https://devcoderz-api.vercel.app/api/video?${params.toString()}`;

    try {
      status.innerText = "Fetching API data...";
      const res = await fetch(apiUrl);
      const data = await res.json();
      
      status.innerText = "URL mila";
      
      const player = new shaka.Player(video);
      
      player.configure({
        drm: {
          clearKeys: data.clearKeys
        },
        manifest: {
          retryParameters: { maxAttempts: 3, baseDelay: 1000 }
        }
      });

      status.innerText = "Key fetch aur player loading...";
      await player.load(data.manifestUrl);
      status.innerText = "Player loaded";
    } catch (e) {
      status.innerText = "Error 1002: Check network/permissions. " + e.message;
      console.error(e);
    }
  }

  initPlayer();
</script>
</body>
</html>

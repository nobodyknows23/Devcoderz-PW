<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    #player-ui { width: 90%; max-width: 800px; position: relative; }
    #status-bar { padding: 15px; background: #222; border-radius: 8px; margin-bottom: 10px; font-size: 14px; color: #0af; border-left: 4px solid #0af; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0af; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    video { width: 100%; border-radius: 8px; background: #000; }
  </style>
</head>
<body>

<div id="player-ui">
  <div id="status-bar"><span class="loader"></span>Initializing...</div>
  <video id="video" controls autoplay></video>
</div>

<script>
  const status = document.getElementById('status-bar');
  const video = document.getElementById('video');

  function updateStatus(msg) {
    status.innerHTML = `<span class="loader"></span> ${msg}`;
  }

  async function initPlayer() {
    try {
      const params = new URLSearchParams(window.location.search);
      updateStatus("Fetching details...");
      
      const res = await fetch(`https://devcoderz-api.vercel.app/api/video?${params.toString()}`);
      const data = await res.json();
      
      updateStatus("URL mila! Preparing secure connection...");
      
      const player = new shaka.Player(video);
      
      player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.allowCrossSiteCredentials = true;
      });

      player.configure({ drm: { clearKeys: data.clearKeys } });

      updateStatus("Key fetch aur Player load ho raha hai...");
      
      await player.load(data.manifestUrl);
      status.innerHTML = "✅ Video Ready! Enjoy.";
      status.style.borderColor = "#0f0";
      status.style.color = "#0f0";
    } catch (e) {
      status.innerHTML = "❌ Error: " + e.message;
      status.style.borderColor = "#f00";
    }
  }

  initPlayer();
</script>
</body>
</html>

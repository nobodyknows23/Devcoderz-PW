<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    #player-container { width: 90%; max-width: 800px; }
    #status-bar { padding: 15px; background: #1a1a1a; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #0af; }
    video { width: 100%; border-radius: 8px; }
  </style>
</head>
<body>

<div id="player-container">
  <div id="status-bar">Initializing...</div>
  <video id="video" controls autoplay></video>
</div>

<script>
  const status = document.getElementById('status-bar');
  const video = document.getElementById('video');

  function log(msg) { status.innerText = msg; }

  async function initPlayer() {
    try {
      const params = new URLSearchParams(window.location.search);
      log("Fetching video info...");
      
      const res = await fetch(`https://devcoderz-api.vercel.app/api/video?${params.toString()}`);
      const data = await res.json();
      
      log("URL mila: " + data.manifestUrl.substring(0, 15) + "...");
      
      const player = new shaka.Player(video);

      // Sabse important part: Headers ko spoof karna
      player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['Referer'] = 'https://cloudfront.testwave.cc/';
        request.headers['Origin'] = 'https://cloudfront.testwave.cc';
        request.headers['User-Agent'] = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36';
      });

      player.configure({
        drm: { clearKeys: data.clearKeys }
      });

      log("Key fetch aur Player load ho raha hai...");
      await player.load(data.manifestUrl);
      log("Player loaded successfully!");
    } catch (e) {
      log("Error: " + e.message);
    }
  }

  initPlayer();
</script>
</body>
</html>

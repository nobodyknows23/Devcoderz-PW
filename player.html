<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lecture Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.9/shaka-player.compiled.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .video-container {
            width: 100%;
            max-width: 1200px;
            position: relative;
        }
        video {
            width: 100%;
            height: 100vh;
            display: block;
            background: #000;
        }
        #status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 100;
            text-align: center;
            max-width: 90%;
            color: #00ffcc;
        }
        #status.error { color: #ff4444; }
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 10px;
        }
        button {
            background: #333;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #555; }
        @media (max-width: 640px) {
            #controls { padding: 8px 12px; gap: 6px; flex-wrap: wrap; justify-content: center; }
            button { padding: 6px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="status">⏳ Initializing player...</div>
    <div class="video-container">
        <video id="video" controls autoplay playsinline></video>
    </div>
    <div id="controls">
        <button onclick="togglePlay()">▶️ Play/Pause</button>
        <button onclick="skip(-10)">⏪ -10s</button>
        <button onclick="skip(10)">⏩ +10s</button>
        <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const VIDCLOUD_API = 'https://vidcloud.eu.org/play.php';
        
        // ========== GLOBALS ==========
        let player = null;
        let video = null;
        const statusEl = document.getElementById('status');

        // ========== STATUS ==========
        function setStatus(msg, isError = false) {
            console.log(msg);
            statusEl.textContent = msg;
            statusEl.className = isError ? 'error' : '';
        }

        // ========== MAIN INIT ==========
        async function initPlayer() {
            try {
                // Get parameters from URL
                const params = new URLSearchParams(window.location.search);
                
                // Option 1: Direct URL mode
                let directUrl = params.get('url');
                if (directUrl) {
                    setStatus('📺 Loading direct URL...');
                    await loadVideo(directUrl);
                    return;
                }

                // Option 2: API mode (uses vidcloud.eu.org)
                const batchId = params.get('batchId') || params.get('batch_id');
                const subjectId = params.get('subjectId') || params.get('subject_id');
                const topicId = params.get('topicId') || params.get('topic_id');
                const videoId = params.get('videoId') || params.get('video_id');

                if (batchId && subjectId && topicId && videoId) {
                    setStatus('🔍 Fetching video from vidcloud...');
                    await loadFromVidCloud(batchId, subjectId, topicId, videoId);
                    return;
                }

                // Option 3: Play.php style (full URL with all params)
                if (window.location.search.includes('video_url=')) {
                    setStatus('📺 Loading from play.php style URL...');
                    const videoUrl = params.get('video_url');
                    if (videoUrl) {
                        await loadVideo(decodeURIComponent(videoUrl));
                        return;
                    }
                }

                throw new Error('Missing parameters. Use: ?url=VIDEO_URL OR ?batchId=&subjectId=&topicId=&videoId=');

            } catch (error) {
                setStatus('❌ Error: ' + error.message, true);
                console.error(error);
            }
        }

        // ========== LOAD FROM VIDCLOUD ==========
        async function loadFromVidCloud(batchId, subjectId, topicId, videoId) {
            try {
                // Build the URL like vidcloud.eu.org does
                const url = `${VIDCLOUD_API}?batch_id=${batchId}&subject_id=${subjectId}&topic_id=${topicId}&video_id=${videoId}`;
                
                setStatus('📡 Fetching signed URL from vidcloud...');
                const response = await fetch(url);
                const html = await response.text();

                // Extract the video URL from their page
                // Method 1: Look for video_url parameter in the HTML
                let videoUrl = null;
                
                // Try to find the video URL in their script tags
                const scriptMatch = html.match(/video_url['"]?\s*[:=]\s*['"]([^'"]+)['"]/);
                if (scriptMatch) {
                    videoUrl = scriptMatch[1];
                }

                // Method 2: Look for the iframe or video source
                if (!videoUrl) {
                    const iframeMatch = html.match(/src=['"]([^'"]*cloudfront[^'"]*)['"]/);
                    if (iframeMatch) {
                        videoUrl = iframeMatch[1];
                    }
                }

                // Method 3: Look for the MPD URL directly
                if (!videoUrl) {
                    const mpdMatch = html.match(/https?:\/\/[^'"]*\.mpd[^'"]*/);
                    if (mpdMatch) {
                        videoUrl = mpdMatch[0];
                    }
                }

                if (!videoUrl) {
                    throw new Error('Could not extract video URL from vidcloud response');
                }

                setStatus('✅ Video URL extracted, loading...');
                await loadVideo(videoUrl);

            } catch (error) {
                throw new Error('Failed to load from vidcloud: ' + error.message);
            }
        }

        // ========== LOAD VIDEO ==========
        async function loadVideo(videoUrl) {
            try {
                video = document.getElementById('video');
                
                // Destroy existing player
                if (player) {
                    try { player.destroy(); } catch(e) {}
                    player = null;
                }

                // Create new Shaka player
                player = new shaka.Player(video);
                
                // Configure for CloudFront
                const config = {
                    streaming: {
                        retryParameters: {
                            maxAttempts: 5,
                            baseDelay: 1000,
                            backoffFactor: 2
                        }
                    },
                    manifest: {
                        retryParameters: {
                            maxAttempts: 5,
                            baseDelay: 1000,
                            backoffFactor: 2
                        }
                    },
                    drm: {
                        clearKeys: {} // No DRM for CloudFront signed URLs
                    }
                };
                
                player.configure(config);

                // Handle errors
                player.addEventListener('error', (event) => {
                    const detail = event.detail;
                    setStatus(`⚠️ Player error: ${detail?.category || 'Unknown'} - ${detail?.code || ''}`, true);
                    console.error('Shaka error:', detail);
                });

                // Success events
                player.addEventListener('manifestparsed', () => {
                    setStatus('✅ Video loaded successfully!');
                });

                // Load the video
                setStatus('🔄 Loading video...');
                await player.load(videoUrl);
                
                // Auto-play
                try {
                    await video.play();
                } catch (e) {
                    console.log('Auto-play blocked, waiting for user interaction');
                }

            } catch (error) {
                throw new Error('Failed to load video: ' + error.message);
            }
        }

        // ========== CONTROLS ==========
        function togglePlay() {
            if (!video) return;
            video.paused ? video.play() : video.pause();
        }

        function skip(seconds) {
            if (!video) return;
            video.currentTime = Math.max(0, Math.min(video.duration || 0, video.currentTime + seconds));
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        }

        // ========== KEYBOARD SHORTCUTS ==========
        document.addEventListener('keydown', (e) => {
            if (!video) return;
            switch(e.key) {
                case ' ':
                case 'k': e.preventDefault(); togglePlay(); break;
                case 'ArrowRight': e.preventDefault(); skip(10); break;
                case 'ArrowLeft': e.preventDefault(); skip(-10); break;
                case 'f': case 'F': toggleFullscreen(); break;
            }
        });

        // ========== START ==========
        document.addEventListener('DOMContentLoaded', initPlayer);
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <style>
        body { margin: 0; background: #000; }
        #video { width: 100%; max-height: 100vh; }
        #loading { 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial;
        }
        #error {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-family: Arial;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">Loading lecture...</div>
    <div id="error">
        <h2>❌ Failed to Load Video</h2>
        <p id="errorMsg">Something went wrong</p>
        <button onclick="location.reload()">Retry</button>
    </div>
    <video id="video" autoplay controls style="width:100%; height:100vh;"></video>

    <script>
        // ========== CONFIGURATION ==========
        // Use your actual API endpoints
        const API_BASE = "https://devcoderz-api.vercel.app";
        const PROXY_URL = "https://rangexcoder-backend.onrender.com/apiserver/api/pi/play?url=";
        
        // If you have a separate proxy for CloudFront segments
        const SEGMENT_PROXY = "https://your-proxy.vercel.app/api/proxy?url=";

        // ========== GLOBALS ==========
        let player = null;
        const video = document.getElementById('video');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const errorMsg = document.getElementById('errorMsg');

        // ========== INIT ==========
        document.addEventListener('shaka-ui-loaded', initPlayer);
        window.addEventListener('load', () => {
            // If shaka doesn't load, try init anyway
            setTimeout(initPlayer, 2000);
        });

        async function initPlayer() {
            try {
                loadingEl.style.display = 'block';
                errorEl.style.display = 'none';

                // Get URL parameters
                const params = new URLSearchParams(window.location.search);
                
                // Check if we have a direct URL parameter
                let directUrl = params.get('url');
                if (directUrl) {
                    console.log('📺 Direct URL mode:', directUrl);
                    await playDirectUrl(directUrl);
                    return;
                }

                // Otherwise use API mode
                const batchId = params.get('batchId');
                const subjectId = params.get('subjectId');
                const childId = params.get('childId');
                const videoId = params.get('videoId');

                if (!batchId || !subjectId || !childId || !videoId) {
                    throw new Error('Missing required parameters: batchId, subjectId, childId, videoId');
                }

                console.log('📡 Fetching video URL from API...');
                
                // Step 1: Get video URL with signed URL
                const urlRes = await fetch(`${API_BASE}/api/video-url?batchId=${batchId}&subjectId=${subjectId}&childId=${childId}&videoId=${videoId}`);
                const urlData = await urlRes.json();
                
                if (!urlData.data || !urlData.data.url) {
                    throw new Error('Failed to get video URL from API');
                }

                const manifest = urlData.data.url + (urlData.data.signedUrl || '');
                console.log('📄 Manifest URL:', manifest);

                // Step 2: Get KID from MPD
                console.log('🔑 Fetching KID...');
                const kidRes = await fetch(`${API_BASE}/api/key?mpdUrl=${encodeURIComponent(manifest)}`);
                const kidData = await kidRes.json();
                
                if (!kidData.kid) {
                    throw new Error('Failed to get KID from MPD');
                }
                console.log('🔑 KID:', kidData.kid);

                // Step 3: Get decryption key
                console.log('🔐 Fetching decryption key...');
                const keyRes = await fetch(`${API_BASE}/api/get-otp?kid=${kidData.kid}`);
                const keyData = await keyRes.json();
                
                if (!keyData.key) {
                    throw new Error('Failed to get decryption key');
                }
                console.log('🔐 Key received:', keyData.key.substring(0, 20) + '...');

                // Step 4: Initialize Shaka Player with clear key
                await initShakaPlayer(manifest, keyData.keyid, keyData.key);

            } catch (error) {
                console.error('❌ Init error:', error);
                showError(error.message);
            }
        }

        // ========== DIRECT URL PLAYBACK ==========
        async function playDirectUrl(url) {
            try {
                // Check if it's a signed CloudFront URL
                const isCloudFront = url.includes('cloudfront.net');
                const isSigned = url.includes('Signature=') || url.includes('Key-Pair-Id=');
                
                if (isCloudFront && !isSigned) {
                    console.warn('⚠️ Unsigned CloudFront URL detected - may fail');
                }

                // Try to play directly with Shaka
                await initShakaPlayer(url, null, null);
                
            } catch (error) {
                console.error('Direct URL playback failed:', error);
                showError('Failed to play video: ' + error.message);
            }
        }

        // ========== SHAKA PLAYER INIT ==========
        async function initShakaPlayer(manifestUrl, keyId, key) {
            try {
                // Destroy existing player
                if (player) {
                    try { player.destroy(); } catch(e) {}
                    player = null;
                }

                // Create new player
                player = new shaka.Player(video);
                
                // ========== FIX 1: Networking Engine with Proxy Support ==========
                const networkingEngine = player.getNetworkingEngine();
                
                // Add request filters for CORS and headers
                networkingEngine.registerRequestFilter((type, request) => {
                    // Allow cross-origin credentials
                    request.allowCrossSiteCredentials = true;
                    
                    // Add proper headers for CloudFront
                    request.headers['Accept'] = '*/*';
                    request.headers['Origin'] = window.location.origin;
                    request.headers['Referer'] = window.location.href;
                    
                    // If it's a CloudFront request, add cookie for authentication
                    if (request.uris && request.uris[0] && request.uris[0].includes('cloudfront.net')) {
                        request.headers['Cookie'] = document.cookie || '';
                    }
                });

                // ========== FIX 2: Response Filter to Rewrite Segment URLs ==========
                networkingEngine.registerResponseFilter((type, response) => {
                    // Only process manifest files
                    if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
                        try {
                            // Parse the MPD XML
                            const text = new TextDecoder('utf-8').decode(response.data);
                            
                            // Check if it's an MPD file
                            if (text.includes('<MPD') || text.includes('<Period')) {
                                // Rewrite segment URLs to go through proxy if needed
                                // This helps with CORS issues
                                const modifiedText = text.replace(
                                    /https:\/\/d1d34p8vz63oiq\.cloudfront\.net\/[^"'\s<>]+\.m4s/g,
                                    (match) => {
                                        // If you have a segment proxy, use it
                                        if (SEGMENT_PROXY) {
                                            return SEGMENT_PROXY + encodeURIComponent(match);
                                        }
                                        // Otherwise keep original
                                        return match;
                                    }
                                );
                                
                                if (modifiedText !== text) {
                                    console.log('🔄 Rewrote segment URLs in MPD');
                                    response.data = new TextEncoder().encode(modifiedText);
                                }
                            }
                        } catch (e) {
                            console.warn('Failed to process MPD response:', e);
                        }
                    }
                });

                // ========== FIX 3: DRM Configuration with Clear Keys ==========
                const config = {
                    streaming: {
                        ignoreTextStreamFailures: true,
                        alwaysStreamText: false,
                        retryParameters: {
                            maxAttempts: 5,
                            baseDelay: 1000,
                            backoffFactor: 2
                        }
                    },
                    manifest: {
                        retryParameters: {
                            maxAttempts: 5,
                            baseDelay: 1000,
                            backoffFactor: 2
                        }
                    }
                };

                // Add clear keys if provided
                if (keyId && key) {
                    config.drm = {
                        clearKeys: {
                            [keyId]: key
                        }
                    };
                    console.log('🔐 Clear key configured for KID:', keyId);
                } else {
                    // Try without DRM (for non-encrypted content)
                    config.drm = {
                        clearKeys: {}
                    };
                    console.log('🔓 No DRM - attempting direct playback');
                }

                player.configure(config);

                // ========== FIX 4: Error Handling ==========
                player.addEventListener('error', (event) => {
                    console.error('Shaka Player Error:', event.detail);
                    const error = event.detail;
                    
                    // Try to recover from common errors
                    if (error.category === 'NETWORK' && error.code === 401) {
                        showError('Authentication failed. Please refresh and try again.');
                    } else if (error.category === 'DRM') {
                        showError('DRM error: ' + (error.message || 'Failed to decrypt video'));
                    } else {
                        showError('Player error: ' + (error.message || 'Unknown error'));
                    }
                });

                // Log important events
                player.addEventListener('manifestparsed', () => {
                    console.log('✅ Manifest parsed successfully');
                });

                player.addEventListener('trackschanged', () => {
                    console.log('🔄 Tracks changed');
                });

                // ========== FIX 5: Load with Proxy ==========
                // Use proxy URL for manifest to avoid CORS issues
                let loadUrl = manifestUrl;
                
                // If it's a CloudFront URL without proxy, use the proxy
                if (manifestUrl.includes('cloudfront.net') && !manifestUrl.includes(PROXY_URL)) {
                    loadUrl = PROXY_URL + encodeURIComponent(manifestUrl);
                    console.log('🔄 Using proxy for manifest:', loadUrl);
                }

                // Load the video
                await player.load(loadUrl);
                console.log('✅ Video loaded successfully');

                // Auto-play
                try {
                    await video.play();
                } catch (e) {
                    console.log('Auto-play blocked, waiting for user interaction');
                }

                loadingEl.style.display = 'none';

                // ========== FIX 6: Handle fullscreen ==========
                document.addEventListener('fullscreenchange', () => {
                    if (document.fullscreenElement) {
                        video.style.height = '100vh';
                    }
                });

            } catch (error) {
                console.error('❌ Shaka init error:', error);
                throw error;
            }
        }

        // ========== UTILITY FUNCTIONS ==========
        function showError(msg) {
            loadingEl.style.display = 'none';
            errorEl.style.display = 'block';
            errorMsg.textContent = msg;
            console.error('Error:', msg);
        }

        // ========== KEYBOARD SHORTCUTS ==========
        document.addEventListener('keydown', (e) => {
            if (!video) return;
            
            switch(e.key) {
                case ' ':
                case 'k':
                    e.preventDefault();
                    video.paused ? video.play() : video.pause();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    video.currentTime += 10;
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    video.currentTime -= 10;
                    break;
                case 'f':
                case 'F':
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                    break;
            }
        });

        // Handle visibility change for better performance
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && video) {
                video.pause();
            }
        });

        console.log('🎯 Player initialized with fixes');
    </script>
</body>
</html>

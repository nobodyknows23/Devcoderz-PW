<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaka Player with CloudFront Proxy</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .video-container {
            width: 100%;
            max-width: 900px;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
        }
        #status-box {
            color: #00ffcc;
            margin-top: 15px;
            font-size: 13px;
            text-align: center;
            padding: 0 20px;
            max-width: 800px;
            word-break: break-all;
        }
        #controls {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            background: #333;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="videoPlayer" controls autoplay playsinline></video>
        <div id="status-box">Initializing player...</div>
        <div id="controls">
            <button onclick="togglePlay()">▶️ Play/Pause</button>
            <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
        </div>
    </div>

    <script>
        const statusBox = document.getElementById('status-box');
        let player = null;
        let video = null;

        function updateStatus(message, isError = false) {
            console.log(message);
            statusBox.style.color = isError ? '#ff4444' : '#00ffcc';
            statusBox.innerText = message;
        }

        // ========== TOGGLE FUNCTIONS ==========
        function togglePlay() {
            if (!video) return;
            video.paused ? video.play() : video.pause();
        }

        function toggleFullscreen() {
            const container = document.querySelector('.video-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen?.() || document.documentElement.requestFullscreen?.();
            } else {
                document.exitFullscreen?.();
            }
        }

        // ========== MAIN INIT ==========
        async function initApp() {
            try {
                shaka.polyfill.installAll();
                if (!shaka.Player.isBrowserSupported()) {
                    updateStatus('Error: Browser not supported!', true);
                    return;
                }

                // Get URL parameters
                const urlParams = new URLSearchParams(window.location.search);
                
                // Option 1: Direct URL from query parameter
                let directUrl = urlParams.get('url');
                
                // Option 2: API-based fetching
                const batchId = urlParams.get('batchId');
                const subjectId = urlParams.get('subjectId');
                const scheduleId = urlParams.get('scheduleId');

                let manifestUrl = null;
                let clearKey = null;

                // Try direct URL first
                if (directUrl) {
                    updateStatus('📺 Using direct URL mode...');
                    manifestUrl = directUrl;
                    
                    // Check if it's a CloudFront URL without signature
                    if (manifestUrl.includes('cloudfront.net') && !manifestUrl.includes('Signature=')) {
                        updateStatus('⚠️ Unsigned CloudFront URL detected - may fail', true);
                    }
                }
                // Then try API mode
                else if (batchId && subjectId && scheduleId) {
                    updateStatus('📡 Fetching video from API...');
                    const timestamp = new Date().getTime();
                    const apiUrl = `https://brainboxinstitute.in/api/video-url?batchId=${batchId}&subjectId=${subjectId}&scheduleId=${scheduleId}&t=${timestamp}`;

                    const response = await fetch(apiUrl);
                    if (!response.ok) {
                        throw new Error(`API Error: ${response.status}`);
                    }

                    const data = await response.json();
                    if (!data.success || !data.video_data) {
                        throw new Error('Invalid API response');
                    }

                    // Extract manifest URL
                    let rawUrl = data.video_data.url;
                    // Replace stream URL if needed
                    if (rawUrl.includes('streamvideo.co.in')) {
                        rawUrl = rawUrl.replace('https://streamvideo.co.in/play/', 'https://cloudfront.testwave.cc/');
                    }
                    
                    manifestUrl = rawUrl;
                    
                    // Extract clear key
                    if (data.video_data.keys && data.video_data.keys.length > 0) {
                        const keyData = data.video_data.keys[0];
                        if (keyData.includes(':')) {
                            const [kid, key] = keyData.split(':');
                            clearKey = { [kid]: key };
                        }
                    }
                } else {
                    throw new Error('Missing parameters. Provide either ?url= OR ?batchId=&subjectId=&scheduleId=');
                }

                if (!manifestUrl) {
                    throw new Error('No manifest URL available');
                }

                // ========== SETUP PROXY ==========
                // Use your proxy endpoint for the manifest
                const proxyBase = window.location.origin;
                const proxyUrl = `${proxyBase}/api/player?url=${encodeURIComponent(manifestUrl)}`;
                
                updateStatus(`🔄 Loading via proxy: ${proxyUrl}`);

                // ========== INIT SHAKA PLAYER ==========
                video = document.getElementById('videoPlayer');
                player = new shaka.Player(video);

                // Configure networking for CloudFront
                const networkingEngine = player.getNetworkingEngine();
                if (networkingEngine) {
                    networkingEngine.registerRequestFilter((type, request) => {
                        // Add headers for CloudFront
                        request.headers['Origin'] = window.location.origin;
                        request.headers['Referer'] = window.location.href;
                        request.allowCrossSiteCredentials = true;
                    });
                }

                // Configure DRM
                const config = {
                    streaming: {
                        retryParameters: {
                            maxAttempts: 5,
                            baseDelay: 1000,
                            backoffFactor: 2
                        }
                    },
                    manifest: {
                        retryParameters: {
                            maxAttempts: 5,
                            baseDelay: 1000,
                            backoffFactor: 2
                        }
                    }
                };

                // Add clear key if available
                if (clearKey) {
                    config.drm = { clearKeys: clearKey };
                    updateStatus(`🔐 DRM configured with clear key`);
                } else {
                    config.drm = { clearKeys: {} };
                    updateStatus(`🔓 No DRM - attempting direct playback`);
                }

                player.configure(config);

                // Error handling
                player.addEventListener('error', (event) => {
                    const detail = event.detail;
                    const code = detail?.code || 'Unknown';
                    const category = detail?.category || 'Unknown';
                    const msg = detail?.message || '';
                    updateStatus(`⚠️ Player Error: ${category} - ${code} | ${msg}`, true);
                    
                    // Try direct URL fallback if proxy fails
                    if (detail?.category === 'NETWORK' && detail?.code === 401) {
                        updateStatus('🔄 Trying direct URL fallback...');
                        setTimeout(() => {
                            try {
                                player.load(manifestUrl);
                            } catch (e) {
                                updateStatus(`Fallback also failed: ${e.message}`, true);
                            }
                        }, 1000);
                    }
                });

                // Success events
                player.addEventListener('manifestparsed', () => {
                    updateStatus('✅ Manifest parsed successfully');
                });

                player.addEventListener('trackschanged', () => {
                    updateStatus('🔄 Track quality changed');
                });

                // ========== LOAD VIDEO ==========
                try {
                    await player.load(proxyUrl);
                    updateStatus('✅ Video loaded and playing!');
                } catch (loadError) {
                    // If proxy fails, try direct URL
                    if (manifestUrl.includes('cloudfront.net')) {
                        updateStatus('🔄 Proxy failed, trying direct CloudFront URL...');
                        try {
                            await player.load(manifestUrl);
                            updateStatus('✅ Video loaded directly!');
                        } catch (directError) {
                            throw new Error(`Both proxy and direct loading failed: ${directError.message}`);
                        }
                    } else {
                        throw loadError;
                    }
                }

            } catch (error) {
                const errorMsg = error?.message || JSON.stringify(error);
                updateStatus(`❌ Critical Error: ${errorMsg}`, true);
            }
        }

        // ========== KEYBOARD SHORTCUTS ==========
        document.addEventListener('keydown', (e) => {
            if (!video) return;
            switch(e.key) {
                case ' ':
                case 'k':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    video.currentTime += 10;
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    video.currentTime -= 10;
                    break;
                case 'f':
                case 'F':
                    toggleFullscreen();
                    break;
            }
        });

        // Handle visibility change
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && video && !video.paused) {
                video.pause();
            }
        });

        // ========== START ==========
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DevCoderz Ultra Player</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
html,body{width:100%;height:100%;background:#000;overflow:hidden}

.player{position:fixed;inset:0;background:#000}
video{width:100%;height:100%;object-fit:contain}

.top-brand{position:absolute;top:6px;left:50%;transform:translateX(-50%);
z-index:40;text-align:center;pointer-events:none}
.top-brand .jsr{color:#ff9800;font-weight:700;font-size:14px}
.top-brand .dev{font-size:12px;color:#00e5ff}

.center-play{position:absolute;inset:0;display:flex;align-items:center;
justify-content:center;z-index:30;cursor:pointer}
.center-play.hide{display:none}
.center-play span{width:90px;height:90px;border-radius:50%;
background:rgba(255,255,255,.25);display:flex;
align-items:center;justify-content:center;font-size:40px;color:#fff}

.controls{position:absolute;bottom:0;width:100%;padding:10px;
background:linear-gradient(transparent,rgba(0,0,0,.9));
transition:.3s;z-index:35}
.controls.hide{transform:translateY(100%);opacity:0}

.progress{height:7px;background:#555;border-radius:10px;margin-bottom:6px}
.progress-fill{height:100%;width:0;background:#2196f3;border-radius:10px}

.row{display:flex;justify-content:space-between;align-items:center;color:#fff}
.btn{width:38px;height:38px;border:1.5px solid #fff;border-radius:50%;
display:flex;align-items:center;justify-content:center;cursor:pointer}

.download{background:#ff4444;border:none;border-radius:18px;
padding:6px 14px;font-weight:700}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);
display:flex;align-items:center;justify-content:center;z-index:100}
.box{background:#1e3c72;padding:24px;border-radius:18px;text-align:center;color:#fff}
.box a,.box button{margin-top:12px;padding:12px;width:100%;
border-radius:22px;border:none;font-weight:700}
.join{background:#fff;color:#1e3c72;text-decoration:none}
.continue{background:transparent;color:#fff;border:1px solid #fff}
</style>
</head>

<body>

<!-- Telegram popup -->
<div class="overlay" id="tgPopup">
 <div class="box">
  <h3>Join Telegram</h3>
  <a class="join" href="https://t.me/+JXdxtVzQf-NhM2Jl" target="_blank">Join</a>
  <button class="continue" id="continueBtn">Continue</button>
 </div>
</div>

<div class="player" id="player">

 <video id="video" playsinline></video>

 <div class="top-brand">
  <div class="jsr">🚩 Jai Shree Ram 🚩</div>
  <div class="dev">Developed by DevXShivam</div>
 </div>

 <div class="center-play" id="centerPlay"><span>▶</span></div>

 <div class="controls hide" id="controls">
  <div class="progress">
   <div class="progress-fill" id="bar"></div>
  </div>

  <div class="row">
   <div class="btn" id="play">▶</div>
   <button class="download" id="downloadBtn">Download</button>
   <div class="btn" id="fs">⛶</div>
  </div>
 </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const v = document.getElementById("video");
const playBtn = document.getElementById("play");
const fs = document.getElementById("fs");
const bar = document.getElementById("bar");
const controls = document.getElementById("controls");
const centerPlay = document.getElementById("centerPlay");
const tgPopup = document.getElementById("tgPopup");
const continueBtn = document.getElementById("continueBtn");
const downloadBtn = document.getElementById("downloadBtn");

/* 🔥 FIX: Url + url dono */
const params = new URLSearchParams(location.search);
const videoUrl = params.get("Url") || params.get("url");

if(!videoUrl){
 alert("No video URL found");
}

if(Hls.isSupported() && videoUrl){
 const hls = new Hls();
 hls.loadSource(decodeURIComponent(videoUrl));
 hls.attachMedia(v);
}else if(videoUrl){
 v.src = decodeURIComponent(videoUrl);
}

continueBtn.onclick = () => {
 tgPopup.style.display="none";
 controls.classList.remove("hide");
 centerPlay.classList.remove("hide");
};

centerPlay.onclick = () => v.play();
playBtn.onclick = () => v.paused ? v.play() : v.pause();

v.onplay = () => {
 playBtn.textContent="❚❚";
 centerPlay.classList.add("hide");
 controls.classList.remove("hide");
};

v.onpause = () => {
 playBtn.textContent="▶";
 centerPlay.classList.remove("hide");
};

v.ontimeupdate = () => {
 if(!v.duration) return;
 bar.style.width = (v.currentTime/v.duration*100)+"%";
};

fs.onclick = () => {
 !document.fullscreenElement ? player.requestFullscreen() : document.exitFullscreen();
};

/* ✅ DOWNLOAD REDIRECT (working) */
downloadBtn.onclick = () => {
 if(!videoUrl){
  alert("No URL");
  return;
 }
 window.location.href = decodeURIComponent(videoUrl);
};
</script>

</body>
</html>

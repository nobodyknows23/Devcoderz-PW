<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic</title>

    <link href="https://www.pw.live/batches-new/index.BZrLlnYz.css" rel="stylesheet" type="text/css">
    <link href="https://pw-batches-mfe.pw.live/static/css/async/pw-package.01fd1956.css" rel="stylesheet" type="text/css">
    <style>
        .lecture-card { border: 1px solid #e5e7eb; padding: 15px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; }
        .lecture-card:hover { border: 1px solid #22c55e; }
        #loadingScreen { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="loadingScreen">Loading...</div>

    <div class="wrapper-fOD1sd">
        <div id="contentContainer" class="index_class_2-nA57WL">
            </div>
    </div>

    <script>
        async function fetchContent() {
            const params = new URLSearchParams(window.location.search);
            const query = params.toString();
            
            // Proxy URL jo aapne bataya
            const proxyUrl = `https://DevCoderZ.vercel.app/api/stream.js?${query}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                document.getElementById('loadingScreen').style.display = 'none';
                const container = document.getElementById('contentContainer');

                container.innerHTML = data.map(item => `
                    <div class="lecture-card" onclick="alert('Playing: ${item.name}')">
                        <p>${item.name}</p>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Error:", err);
                document.getElementById('loadingScreen').innerText = "Failed to load content.";
            }
        }
        fetchContent();
    </script>
</body>
</html>
